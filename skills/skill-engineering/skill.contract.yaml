name: skill-engineering
kind: orchestrator
owner: self
status: active

purpose: >-
  为普通用户提供可恢复的对话式引导,快速生成从第一版开始就符合工程规范的 Skill,
  并自动完成选择、体检、持续维护、自进化评测、发布、验证与安全撤销。

triggers:
  use_when:
    - "用户明确提到 skill-engineering 或 Skill Engineering,并要求测试、创建、检查、维护或发布它。"
    - "用户希望快速生成从第一版开始就边界清楚、架构合理且可验证的 Skill。"
    - "用户想创建、更新、重构、review、安装或体检 skill。"
    - "用户希望 skill 根据失败、纠正或运行证据自动生成候选并进化。"
    - "用户需要判断某个能力应该做成 skill、plugin、script、project doc 还是 profile entry。"
    - "用户想检查 global/project/plugin/direct skill 暴露和路由成本。"
    - "AI 正在创建、修改或重构复杂/商业 skill,需要防止架构漂移并管理版本。"
  do_not_use_when:
    - "任务只是普通应用开发,没有可复用 skill 或安装治理问题。"
    - "用户要执行某个领域 skill 的业务流程,而不是工程化这个 skill。"
    - "任务只做项目 harness 初始化、Claude/Codex 入口对齐、tmux 项目墙或开工自检。"

inputs:
  - name: capability_brief
    type: text
    required: false
  - name: skill_path
    type: path
    required: false
  - name: project_path
    type: path
    required: false
  - name: governance_profile
    type: enum
    required: false
    values: [personal, team, production]
    default: personal

outputs:
  - name: user_status_summary
    type: text
    required: true
    contract: "默认只说明结果、用户影响和下一步;内部记录放在可选技术详情。"
  - name: journey_session
    type: json-or-text
    required: false
  - name: selection_recommendation
    type: text
    required: false
  - name: discovery_summary
    type: text
    required: false
    contract: "先汇总机器自查事实和用户已确认的真实任务,信息不足时保持 needs_discovery。"
  - name: artifact_options
    type: text
    required: false
    contract: "信息足够后比较最相关的 2-3 个产物方案,并给出推荐与取舍。"
  - name: skill_scaffold
    type: files
    required: false
    contract: "根据已确认架构生成最小但完整的可用候选,不得只创建空目录或无边界 Prompt。"
  - name: doctor_report
    type: json-or-text
    required: false
  - name: quality_score
    type: json-or-text
    required: false
  - name: evidence_assessment
    type: json-or-text
    required: false
  - name: repair_plan
    type: text
    required: false
  - name: maintenance_record
    type: json-or-text
    required: false
  - name: change_record
    type: json-or-text
    required: false
  - name: verification_record
    type: json-or-text
    required: false
  - name: evolution_proposal
    type: json-or-text
    required: false
  - name: candidate_jobs
    type: files
    required: false
  - name: skill_version
    type: files
    required: false
  - name: release_plan
    type: json-or-text
    required: false
  - name: release_record
    type: json-or-text
    required: false
  - name: governance_plan
    type: files-or-text
    required: false
    contract: "只为复杂、生产、商业或多版本 Skill 补齐必要的产品与开发事实源。"

stops:
  - name: awaiting_scope_confirmation
    condition: "将引入新的 global skill、plugin 或生产级 workflow。"
  - name: awaiting_user_approval
    condition: "请求执行 apply、Canary/Active release、sync、publish、delete、write 等目标 skill 之外的副作用。"
  - name: missing_input
    condition: "没有提供 capability brief、skill path 或 project path,且无法从上下文推断。"

delegates:
  - name: skill-engineering journey
    kind: cli
    when: "开始、恢复或更新对话式引导任务。"
  - name: skill-engineering decide
    kind: cli
    when: "判断能力应该做成 Skill、Plugin/runtime、Script、项目文档、Profile entry 或不新增产物。"
  - name: capability discovery stage
    kind: workflow
    when: "新需求尚未确认真实任务、复用价值、AI 判断价值、触发边界或已有能力复用关系。"
  - name: official skill-creator
    kind: skill
    when: "官方 skill-creator 可用且需要创建或更新标准 Skill 内容。"
  - name: skill-engineering create
    kind: cli
    when: "官方 skill-creator 不可用,或需要确定性的本地创建计划与 apply。"
  - name: skill-engineering improve
    kind: cli
    when: "记录失败模式和根因,对比独立候选目录,生成复杂度增量与确定性 preflight,再按同一计划更新。"
  - name: skill-engineering verify-improvement
    kind: cli
    when: "按维护记录复验修改结果和漂移。"
  - name: skill-engineering undo-improvement
    kind: cli
    when: "用户明确要求撤销本次 Skill 修改且目标未漂移。"
  - name: skill-engineering maintenance-history
    kind: cli
    when: "查看 Skill 多次修改的复杂度趋势和维护记录。"
  - name: Agent Skill Hub
    kind: external-project
    when: "需要 registry、Profile、Global、多项目安装、inventory 或 adapter 分发。"
  - name: skill-engineering lint
    kind: cli
    when: "检查静态 SKILL.md prompt debt 和 frontmatter 问题。"
  - name: skill-engineering doctor
    kind: cli
    when: "检查单个 skill 的结构、contract、行为风险和可维护性。"
  - name: skill-engineering validate-eval-suite
    kind: cli
    when: "在运行行为比较前校验 case portfolio、holdout 和 gates。"
  - name: skill-engineering evaluate
    kind: cli
    when: "对同一 suite 的 baseline/candidate 真实结果计算 holdout、negative transfer 和行为证据结论。"
  - name: skill-engineering evolution
    kind: cli
    when: "导入 SkillRun,形成 Proposal/Dataset/CandidateJob,登记候选、自动评测、Pareto 推荐、版本化并进入 Shadow。"
  - name: host Agent candidate generation
    kind: agent
    when: "读取 CandidateJob 并只在隔离 source 中生成候选内容;核心不绑定模型 provider。"
  - name: skill-engineering release-plan
    kind: cli
    when: "为 Canary 或 Active 生成不可变发布计划并展示确认边界。"
  - name: skill-engineering release
    kind: cli
    when: "用户明确批准同一份未漂移 Release Plan 后发布并验证。"
  - name: skill-engineering release-rollback
    kind: cli
    when: "按 ReleaseRecord 安全回滚且 channel/target 未漂移。"
  - name: project governance stage
    kind: workflow
    when: "复杂、生产、商业或多版本 Skill 需要 Product、Backlog、Spec/Plan、ADR、Sprint、Daily Log 和版本治理。"

forbidden:
  - global_enable_without_scope_review
  - plugin_enable_without_inventory_review
  - irreversible_side_effect_without_user_approval
  - credential_or_network_transfer_without_security_review
  - prompt_injection_or_hidden_override_instruction
  - hardcoded_user_absolute_paths_in_skill_content
  - incident_postmortem_inside_root_skill_md
  - adding_hard_rule_without_rule_id_and_failure_mode
  - internal_stage_exposed_as_top_level_skill
  - arbitrary_command_execution_from_evaluation_suite
  - direct_source_edit_without_maintenance_plan
  - implicit_delete_from_candidate_absence
  - improvement_apply_without_preflight_or_same_plan_id
  - llm_semantic_score_in_deterministic_evaluation_version
  - raw_sensitive_prompt_or_secret_in_evolution_state
  - holdout_assertion_exposed_to_candidate_generator
  - unapproved_canary_or_active_release
  - automatic_global_release
  - release_apply_without_same_plan_id
  - raw_tool_output_as_default_user_feedback
  - approval_request_using_only_internal_release_terms
  - claiming_overall_success_when_any_required_cleanup_record_failed
  - complex_or_commercial_feature_without_spec_and_plan
  - product_history_or_incident_log_inside_root_skill_md
  - version_or_release_claim_without_matching_evidence
  - default_create_skill_with_blocking_unknowns
  - artifact_creation_before_discovery_decision
  - product_or_version_scaffold_before_skill_decision_for_new_request

state:
  files:
    - name: journey_sessions
      path: ".skill-engineering/journeys/*.json"
      required: false
    - name: install_plans
      path: ".skill-engineering/plans/*.json"
      required: false
    - name: change_records
      path: ".skill-engineering/records/*.json"
      required: false
    - name: maintenance_records
      path: ".skill-engineering/maintenance-records/*.json"
      required: false
    - name: maintenance_backups
      path: ".skill-engineering/maintenance-backups/*"
      required: false
    - name: optional_doctor_report
      path: ".skill-engineering/doctor-report.json"
      required: false
    - name: evolution_state
      path: ".skill-engineering/evolution/"
      required: false
    - name: immutable_skill_versions
      path: ".skill-engineering/evolution/skills/*/versions/*/source/"
      required: false
    - name: release_records
      path: ".skill-engineering/evolution/release-records/*.json"
      required: false
  approvals:
    - name: irreversible_side_effect
      required_before:
        - apply_sync_publish_delete
    - name: canary_or_active_release
      required_before:
        - canary_install
        - active_source_promotion

scripts:
  - path: scripts/doctor_skill.py
    required_flags:
      - "--profile"
      - "--json"
  - path: scripts/render_report.py
    required_flags:
      - "--input"

tests:
  regression_cases:
    - tests/test_skill_doctor.py
    - tests/test_evolution.py
    - tests/user-feedback-cases.yaml
    - tests/product-positioning.yaml

evaluation:
  score_scope: structural_readiness
  claims:
    utility: false
  case_portfolio:
    success: tests/test_skill_doctor.py::test_doctor_skill_clean_atomic_ok
    failure: tests/test_skill_doctor.py::test_doctor_skill_side_effect_without_approval_fails
    high_risk: tests/test_skill_doctor.py::test_doctor_skill_flags_script_exfiltration_risk
  baseline: "Doctor rule ids and exit-code behavior before this upgrade"
  holdout: "Third-party skills not used to author individual EVAL rules"
  negative_transfer: "Reject changes that reduce existing pytest or credential-lint coverage"
  behavioral_results: "python3 -m pytest"
  independent_review: "A reviewer other than the editing agent is required before claiming semantic utility"
  type_checks:
    - cross_stage_io
    - partial_failure
    - aggregation

review:
  lint:
    command: "skill-engineering doctor skills/skill-engineering --profile team"
  notes:
    - "用户-facing canonical identity 是 skill-engineering; 旧别名不得作为顶层 active Skill 暴露。"
    - "根 SKILL.md 必须保持轻薄,只路由到 references 或内部 workflow step。"
    - "创建/选择治理和安装治理是同一个 meta skill 下的两条独立流程。"
    - "安装第三方 skill 前必须检查 prompt injection、凭证访问、网络传输和数据外传组合风险。"
    - "复杂或商业 Skill 使用渐进式治理;简单 atomic Skill 不复制完整项目管理模板。"
    - "快速生成与全生命周期架构保护是同一个承诺;不得把任一方降为事后补救。"
